# Full microservice stack:
#   docker compose --profile microservice up -d
# Or set COMPOSE_PROFILES=microservice in .env so `docker compose up -d` starts the full stack.
#
# PostgreSQL: APIs read DB_* from .env (external database). Optional local Postgres: --profile with-db
#
# Dash UI only (no APIs in Compose): docker compose up -d app
# For app-only, set DATACENTER_API_URL / CUSTOMER_API_URL / QUERY_API_URL in .env to reachable URLs
# (e.g. host.docker.internal:8000 if APIs run on the host).

services:
  auth-db:
    image: postgres:15
    container_name: bulutistan-auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-bulutauth}
      POSTGRES_USER: ${AUTH_DB_USER:-authadmin}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-change_me_auth}
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authadmin -d bulutauth"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datalake

  webui-db:
    image: postgres:15
    container_name: bulutistan-webui-db
    environment:
      POSTGRES_DB: ${WEBUI_DB_NAME:-bulutwebui}
      POSTGRES_USER: ${WEBUI_DB_USER:-webuiadmin}
      POSTGRES_PASSWORD: ${WEBUI_DB_PASS:-change_me_webui}
    ports:
      - "5434:5432"
    volumes:
      - webui_pgdata:/var/lib/postgresql/data
      - ./services/customer-api/migrations/webui:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WEBUI_DB_USER:-webuiadmin} -d ${WEBUI_DB_NAME:-bulutwebui}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datalake

  admin-api:
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
    container_name: datalake-platform-admin-api
    ports:
      - "8060:8000"
    env_file:
      - .env
    environment:
      AUTH_DB_HOST: ${AUTH_DB_HOST:-auth-db}
      AUTH_DB_PORT: ${AUTH_DB_PORT:-5432}
      AUTH_DB_NAME: ${AUTH_DB_NAME:-bulutauth}
      AUTH_DB_USER: ${AUTH_DB_USER:-authadmin}
      AUTH_DB_PASS: ${AUTH_DB_PASS:-change_me_auth}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      FERNET_KEY: ${FERNET_KEY:-}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-false}
      # OpenTelemetry → external collector (OTLP gRPC). Set OTEL_ENABLED=true and OTEL_EXPORTER_OTLP_ENDPOINT in .env
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: admin-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      args:
        APP_BUILD_ID: ${APP_BUILD_ID:-local}
    container_name: datalake-platform-gui-app
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      # Matches image label; override when rebuilding to verify new UI: APP_BUILD_ID=$(git rev-parse --short HEAD) docker compose up -d --build app
      APP_BUILD_ID: ${APP_BUILD_ID:-local}
      # Override .env when APIs run as Compose services (same Docker network)
      DATACENTER_API_URL: ${DATACENTER_API_URL:-http://datacenter-api:8000}
      CUSTOMER_API_URL: ${CUSTOMER_API_URL:-http://customer-api:8000}
      CRM_ENGINE_URL: ${CRM_ENGINE_URL:-http://crm-engine:8000}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:8000}
      # Admin API — when set, settings CRUD is routed through the admin-api service
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin-api:8000}
      # Auth DB still required for session/login handling (Flask auth middleware)
      AUTH_DB_HOST: ${AUTH_DB_HOST:-auth-db}
      AUTH_DB_PORT: ${AUTH_DB_PORT:-5432}
      AUTH_DB_NAME: ${AUTH_DB_NAME:-bulutauth}
      AUTH_DB_USER: ${AUTH_DB_USER:-authadmin}
      AUTH_DB_PASS: ${AUTH_DB_PASS:-change_me_auth}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin123!}
      FERNET_KEY: ${FERNET_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: datalake-webui
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    volumes:
      - ./data:/app/data
    networks:
      - datalake
    depends_on:
      auth-db:
        condition: service_healthy
      admin-api:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: datalake-platform-gui-db
    environment:
      POSTGRES_DB: bulutlake
      POSTGRES_USER: datalakeui
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datalakeui -d bulutlake"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datalake
    profiles:
      - with-db

  redis:
    image: redis:7-alpine
    container_name: bulutistan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - datalake
    profiles:
      - microservice

  datacenter-api:
    build:
      context: ./services/datacenter-api
      dockerfile: Dockerfile
    container_name: bulutistan-datacenter-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WEBUI_DB_HOST: ${WEBUI_DB_HOST:-webui-db}
      WEBUI_DB_PORT: ${WEBUI_DB_PORT:-5432}
      WEBUI_DB_NAME: ${WEBUI_DB_NAME:-bulutwebui}
      WEBUI_DB_USER: ${WEBUI_DB_USER:-webuiadmin}
      WEBUI_DB_PASS: ${WEBUI_DB_PASS:-change_me_webui}
      WEBUI_DB_REQUIRED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: datacenter-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
      webui-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  customer-api:
    build:
      # Repo root so Dockerfile can COPY ../shared (gui shared package + config tooling).
      context: .
      dockerfile: services/customer-api/Dockerfile
    container_name: bulutistan-customer-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      WEBUI_DB_HOST: ${WEBUI_DB_HOST:-webui-db}
      WEBUI_DB_PORT: ${WEBUI_DB_PORT:-5432}
      WEBUI_DB_NAME: ${WEBUI_DB_NAME:-bulutwebui}
      WEBUI_DB_USER: ${WEBUI_DB_USER:-webuiadmin}
      WEBUI_DB_PASS: ${WEBUI_DB_PASS:-change_me_webui}
      WEBUI_DB_REQUIRED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: customer-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
      webui-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  crm-engine:
    build:
      # Repo root so Dockerfile can COPY shared/ + customer-api/app/ shared modules.
      context: .
      dockerfile: services/crm-engine/Dockerfile
    container_name: bulutistan-crm-engine
    ports:
      - "8070:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "2"
      WEBUI_DB_HOST: ${WEBUI_DB_HOST:-webui-db}
      WEBUI_DB_PORT: ${WEBUI_DB_PORT:-5432}
      WEBUI_DB_NAME: ${WEBUI_DB_NAME:-bulutwebui}
      WEBUI_DB_USER: ${WEBUI_DB_USER:-webuiadmin}
      WEBUI_DB_PASS: ${WEBUI_DB_PASS:-change_me_webui}
      WEBUI_DB_REQUIRED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: crm-engine
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
      webui-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  query-api:
    build:
      context: ./services/query-api
      dockerfile: Dockerfile
    container_name: bulutistan-query-api
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: query-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

networks:
  datalake:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  auth_pgdata:
  webui_pgdata:
