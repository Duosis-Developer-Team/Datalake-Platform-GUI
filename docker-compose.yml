# Full microservice stack:
#   docker compose --profile microservice up -d
# Or set COMPOSE_PROFILES=microservice in .env so `docker compose up -d` starts the full stack.
#
# PostgreSQL: APIs read DB_* from .env (external database). Optional local Postgres: --profile with-db
#
# Dash UI only (no APIs in Compose): docker compose up -d app
# For app-only, set DATACENTER_API_URL / CUSTOMER_API_URL / QUERY_API_URL in .env to reachable URLs
# (e.g. host.docker.internal:8000 if APIs run on the host).

services:
  auth-db:
    image: postgres:15
    container_name: bulutistan-auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-bulutauth}
      POSTGRES_USER: ${AUTH_DB_USER:-authadmin}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-change_me_auth}
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authadmin -d bulutauth"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datalake

  webui-db:
    image: postgres:15
    container_name: bulutistan-webui-db
    environment:
      POSTGRES_DB: ${WEBUI_DB_NAME:-bulutwebui}
      POSTGRES_USER: ${WEBUI_DB_USER:-webuiadmin}
      POSTGRES_PASSWORD: ${WEBUI_DB_PASS:-change_me_webui}
    ports:
      - "5434:5432"
    volumes:
      - webui_pgdata:/var/lib/postgresql/data
      - ./services/customer-api/migrations/webui:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WEBUI_DB_USER:-webuiadmin} -d ${WEBUI_DB_NAME:-bulutwebui}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datalake

  admin-api:
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
    container_name: datalake-platform-admin-api
    ports:
      - "8060:8000"
    env_file:
      - .env
    environment:
      AUTH_DB_HOST: ${AUTH_DB_HOST:-auth-db}
      AUTH_DB_PORT: ${AUTH_DB_PORT:-5432}
      AUTH_DB_NAME: ${AUTH_DB_NAME:-bulutauth}
      AUTH_DB_USER: ${AUTH_DB_USER:-authadmin}
      AUTH_DB_PASS: ${AUTH_DB_PASS:-change_me_auth}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      FERNET_KEY: ${FERNET_KEY:-}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-false}
      # OpenTelemetry → external collector (OTLP gRPC). Set OTEL_ENABLED=true and OTEL_EXPORTER_OTLP_ENDPOINT in .env
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: admin-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      args:
        APP_BUILD_ID: ${APP_BUILD_ID:-local}
    container_name: datalake-platform-gui-app
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      # Matches image label; override when rebuilding to verify new UI: APP_BUILD_ID=$(git rev-parse --short HEAD) docker compose up -d --build app
      APP_BUILD_ID: ${APP_BUILD_ID:-local}
      # Override .env when APIs run as Compose services (same Docker network)
      DATACENTER_API_URL: ${DATACENTER_API_URL:-http://datacenter-api:8000}
      CUSTOMER_API_URL: ${CUSTOMER_API_URL:-http://customer-api:8000}
      CRM_ENGINE_URL: ${CRM_ENGINE_URL:-http://crm-engine:8000}
      HMDL_API_URL: ${HMDL_API_URL:-http://hmdl-api:8000}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:8000}
      # Admin API — when set, settings CRUD is routed through the admin-api service
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin-api:8000}
      # Chatbot API — Dash server-side widget calls this internal service only
      CHATBOT_API_URL: ${CHATBOT_API_URL:-http://chatbot-api:8000}
      CHATBOT_CLIENT_TIMEOUT: ${CHATBOT_CLIENT_TIMEOUT:-600}
      CHATBOT_LOG_API_URL: ${CHATBOT_LOG_API_URL:-http://chatbot-log-api:8000}
      CHATBOT_LOG_API_KEY: ${CHATBOT_LOG_API_KEY:-}
      # Auth DB still required for session/login handling (Flask auth middleware)
      AUTH_DB_HOST: ${AUTH_DB_HOST:-auth-db}
      AUTH_DB_PORT: ${AUTH_DB_PORT:-5432}
      AUTH_DB_NAME: ${AUTH_DB_NAME:-bulutauth}
      AUTH_DB_USER: ${AUTH_DB_USER:-authadmin}
      AUTH_DB_PASS: ${AUTH_DB_PASS:-change_me_auth}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin123!}
      FERNET_KEY: ${FERNET_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: datalake-webui
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
      SELLABLE_HOST_BASED_ENABLED: ${SELLABLE_HOST_BASED_ENABLED:-false}
    volumes:
      - ./data:/app/data
    networks:
      - datalake
    depends_on:
      auth-db:
        condition: service_healthy
      admin-api:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: datalake-platform-gui-db
    environment:
      POSTGRES_DB: bulutlake
      POSTGRES_USER: datalakeui
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datalakeui -d bulutlake"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datalake
    profiles:
      - with-db

  redis:
    image: redis:7-alpine
    container_name: bulutistan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - datalake
    profiles:
      - microservice

  datacenter-api:
    build:
      # Repo root so Dockerfile can COPY shared/ (VMware host GHz resolver).
      context: .
      dockerfile: services/datacenter-api/Dockerfile
    container_name: bulutistan-datacenter-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WEBUI_DB_HOST: ${WEBUI_DB_HOST:-webui-db}
      WEBUI_DB_PORT: ${WEBUI_DB_PORT:-5432}
      WEBUI_DB_NAME: ${WEBUI_DB_NAME:-bulutwebui}
      WEBUI_DB_USER: ${WEBUI_DB_USER:-webuiadmin}
      WEBUI_DB_PASS: ${WEBUI_DB_PASS:-change_me_webui}
      WEBUI_DB_REQUIRED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: datacenter-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
      webui-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  customer-api:
    build:
      # Repo root so Dockerfile can COPY ../shared (gui shared package + config tooling).
      context: .
      dockerfile: services/customer-api/Dockerfile
    container_name: bulutistan-customer-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      WEBUI_DB_HOST: ${WEBUI_DB_HOST:-webui-db}
      WEBUI_DB_PORT: ${WEBUI_DB_PORT:-5432}
      WEBUI_DB_NAME: ${WEBUI_DB_NAME:-bulutwebui}
      WEBUI_DB_USER: ${WEBUI_DB_USER:-webuiadmin}
      WEBUI_DB_PASS: ${WEBUI_DB_PASS:-change_me_webui}
      WEBUI_DB_REQUIRED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: customer-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
      # Monthly intel queries (ILIKE full-table scan) can exceed 60 s on large datasets.
      # Hardcoded override: ${VAR:-default} reads from .env first, so a default would not apply.
      DB_STATEMENT_TIMEOUT_MS: "120000"
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
      webui-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  crm-engine:
    build:
      # Repo root so Dockerfile can COPY shared/ + customer-api/app/ shared modules.
      context: .
      dockerfile: services/crm-engine/Dockerfile
    container_name: bulutistan-crm-engine
    ports:
      - "8070:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "2"
      # Datacenter-api Redis DB (db=0) for reading dc_details / global_dashboard keys.
      DATACENTER_REDIS_DB: "0"
      # HTTP fallback when datacenter-api Redis cache is cold.
      DATACENTER_API_URL: ${DATACENTER_API_URL:-http://datacenter-api:8000}
      # Disable client-side statement timeout so long DC-level aggregate queries complete.
      DB_STATEMENT_TIMEOUT_MS: "0"
      # Sellable result cache TTL (seconds). compute_all_panels output is cached
      # in crm-engine Redis (DB 2); 0 disables caching.
      SELLABLE_CACHE_TTL_SECONDS: ${SELLABLE_CACHE_TTL_SECONDS:-900}
      # Days back when constructing dc_details / global_dashboard Redis keys.
      # Must match datacenter-api default_time_range (7) so sellable hits the
      # same keys the DC view populates.
      SELLABLE_REDIS_WINDOW_DAYS: ${SELLABLE_REDIS_WINDOW_DAYS:-7}
      SELLABLE_HOST_BASED_ENABLED: ${SELLABLE_HOST_BASED_ENABLED:-false}
      WEBUI_DB_HOST: ${WEBUI_DB_HOST:-webui-db}
      WEBUI_DB_PORT: ${WEBUI_DB_PORT:-5432}
      WEBUI_DB_NAME: ${WEBUI_DB_NAME:-bulutwebui}
      WEBUI_DB_USER: ${WEBUI_DB_USER:-webuiadmin}
      WEBUI_DB_PASS: ${WEBUI_DB_PASS:-change_me_webui}
      WEBUI_DB_REQUIRED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: crm-engine
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
      webui-db:
        condition: service_healthy
      datacenter-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  hmdl-api:
    build:
      context: .
      dockerfile: services/hmdl-api/Dockerfile
    container_name: bulutistan-hmdl-api
    ports:
      - "8007:8000"
    env_file:
      - .env
    environment:
      HMDL_DB_HOST: ${HMDL_DB_HOST:-${DB_HOST:-}}
      HMDL_DB_PORT: ${HMDL_DB_PORT:-${DB_PORT:-5000}}
      HMDL_DB_NAME: ${HMDL_DB_NAME:-${DB_NAME:-bulutlake}}
      HMDL_DB_USER: ${HMDL_DB_USER:-${DB_USER:-infra_svc}}
      HMDL_DB_PASSWORD: ${HMDL_DB_PASSWORD:-${DB_PASS:-}}
      HMDL_PROXY_ASSIGNMENT_PATH: ${HMDL_PROXY_ASSIGNMENT_PATH:-/app/data/proxy_assignment.yml}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-false}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: hmdl-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - microservice

  query-api:
    build:
      context: ./services/query-api
      dockerfile: Dockerfile
    container_name: bulutistan-query-api
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: query-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    networks:
      - datalake
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  mongodb:
    image: mongo:7
    container_name: bulutistan-chatbot-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${CHATBOT_LOG_MONGO_USER:-chatbot_log}
      MONGO_INITDB_ROOT_PASSWORD: ${CHATBOT_LOG_MONGO_PASS:-change_me_chatbot_log}
    volumes:
      - mongo_chatbot_logs:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - datalake
    profiles:
      - microservice

  chatbot-log-api:
    build:
      context: ./services/chatbot-log-api
      dockerfile: Dockerfile
    container_name: bulutistan-chatbot-log-api
    environment:
      MONGO_URI: mongodb://${CHATBOT_LOG_MONGO_USER:-chatbot_log}:${CHATBOT_LOG_MONGO_PASS:-change_me_chatbot_log}@mongodb:27017/chatbot_logs?authSource=admin
      MONGO_DB: chatbot_logs
      LOG_RETENTION_DAYS: ${CHATBOT_LOG_RETENTION_DAYS:-90}
      INTERNAL_API_KEY: ${CHATBOT_LOG_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - datalake
    profiles:
      - microservice

  chatbot-api:
    build:
      context: .
      dockerfile: ./services/chatbot-api/Dockerfile
    container_name: bulutistan-chatbot-api
    ports:
      - "8080:8000"
    env_file:
      - .env
      # Local-only secrets (gitignored). Holds BULUTISTAN_LLM_API_KEY so it never
      # touches a tracked file. Optional: absent on machines that inject the key
      # another way (shell export / k8s Secret).
      - path: .env.local
        required: false
    environment:
      # NOTE: BULUTISTAN_LLM_API_KEY is intentionally NOT set here — it comes from
      # the env_file (.env.local) so it is never written into this tracked file.
      BULUTISTAN_LLM_BASE_URL: ${BULUTISTAN_LLM_BASE_URL:-https://api.bulutistan.ai/v1}
      CHATBOT_MODEL: ${CHATBOT_MODEL:-gpt-oss-120b}
      CHATBOT_FALLBACK_MODEL: ${CHATBOT_FALLBACK_MODEL:-qwen3-next-80b-instruct}
      CHATBOT_TEMPERATURE: ${CHATBOT_TEMPERATURE:-0.2}
      CHATBOT_MAX_TOKENS: ${CHATBOT_MAX_TOKENS:-1800}
      CHATBOT_TIMEOUT_SECONDS: ${CHATBOT_TIMEOUT_SECONDS:-120}
      CHATBOT_REQUEST_TIMEOUT_SECONDS: ${CHATBOT_REQUEST_TIMEOUT_SECONDS:-600}
      CHATBOT_LLM_REACT_MODE: ${CHATBOT_LLM_REACT_MODE:-true}
      CHATBOT_MAX_TOOL_CALLS_PER_TURN: ${CHATBOT_MAX_TOOL_CALLS_PER_TURN:-150}
      CHATBOT_MAX_LLM_ROUNDS: ${CHATBOT_MAX_LLM_ROUNDS:-150}
      CHATBOT_MAX_TOOL_ITERATIONS: ${CHATBOT_MAX_TOOL_ITERATIONS:-50}
      CHATBOT_MAX_TOOL_CALLS_PER_ITERATION: ${CHATBOT_MAX_TOOL_CALLS_PER_ITERATION:-10}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-false}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      DATACENTER_API_URL: ${DATACENTER_API_URL:-http://datacenter-api:8000}
      CUSTOMER_API_URL: ${CUSTOMER_API_URL:-http://customer-api:8000}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:8000}
      CRM_ENGINE_URL: ${CRM_ENGINE_URL:-http://crm-engine:8000}
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin-api:8000}
      # Read-only DB tools are OFF by default. Enable them from the gitignored
      # .env.local (loaded via env_file below):  CHATBOT_DB_ENABLED=true
      # The DB connection params are intentionally NOT pinned here — the config
      # reads CHATBOT_DB_* first, then falls back to the main stack's DB_* (from
      # .env, loaded via env_file) so the chatbot reuses the bulutlake credentials
      # with a read-only session. Set CHATBOT_DB_USER/CHATBOT_DB_PASS in
      # .env.local to use a dedicated read-only DB user instead. DB tuning
      # (CHATBOT_DB_STATEMENT_TIMEOUT_MS / CHATBOT_DB_MAX_ROWS) is strict-namespaced
      # and never inherits the main stack's DB_* values.
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: chatbot-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      CHATBOT_LOG_API_ENABLED: ${CHATBOT_LOG_API_ENABLED:-true}
      CHATBOT_LOG_API_URL: ${CHATBOT_LOG_API_URL:-http://chatbot-log-api:8000}
      CHATBOT_LOG_API_KEY: ${CHATBOT_LOG_API_KEY:-}
      CHATBOT_LOG_RETENTION_DAYS: ${CHATBOT_LOG_RETENTION_DAYS:-90}
      CHATBOT_TOOL_BACKEND: ${CHATBOT_TOOL_BACKEND:-local}
      DATALAKE_MCP_URL: ${DATALAKE_MCP_URL:-http://datalake-mcp:8010}
    networks:
      - datalake
    depends_on:
      chatbot-log-api:
        condition: service_healthy
      datacenter-api:
        condition: service_healthy
      customer-api:
        condition: service_healthy
      query-api:
        condition: service_healthy
      crm-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - microservice

  datalake-mcp:
    build:
      context: .
      dockerfile: ./services/datalake-mcp/Dockerfile
    container_name: bulutistan-datalake-mcp
    ports:
      - "8010:8010"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      DATACENTER_API_URL: ${DATACENTER_API_URL:-http://datacenter-api:8000}
      CUSTOMER_API_URL: ${CUSTOMER_API_URL:-http://customer-api:8000}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:8000}
      CRM_ENGINE_URL: ${CRM_ENGINE_URL:-http://crm-engine:8000}
      CHATBOT_DB_ENABLED: ${CHATBOT_DB_ENABLED:-false}
    networks:
      - datalake
    depends_on:
      datacenter-api:
        condition: service_healthy
      customer-api:
        condition: service_healthy
      query-api:
        condition: service_healthy
      crm-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - microservice
      - ai-mcp

networks:
  datalake:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  auth_pgdata:
  webui_pgdata:
  mongo_chatbot_logs:
