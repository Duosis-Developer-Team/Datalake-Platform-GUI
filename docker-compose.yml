services:
  app:
    build: .
    container_name: datalake-platform-gui-app
    ports:
      - "8050:8050"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  db:
    image: postgres:15
    container_name: datalake-platform-gui-db
    environment:
      POSTGRES_DB: bulutlake
      POSTGRES_USER: datalakeui
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - microservice
      - with-db

  redis:
    image: redis:7-alpine
    container_name: bulutistan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - microservice

  backend:
    build: ./backend
    container_name: bulutistan-backend-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - db
    profiles:
      - microservice

volumes:
  pgdata:
  redis_data:
