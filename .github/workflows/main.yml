name: CI/CD Pipeline

"on":
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Lint datacenter-api
        run: ruff check services/datacenter-api/app/ --select E,F,W --ignore E501
      - name: Lint customer-api
        run: ruff check services/customer-api/app/ --select E,F,W --ignore E501
      - name: Lint query-api
        run: ruff check services/query-api/app/ --select E,F,W --ignore E501

  test-datacenter-api:
    name: Test datacenter-api
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r services/datacenter-api/requirements.txt
      - name: Run Pytest
        run: cd services/datacenter-api && pytest tests/ -v --tb=short

  test-customer-api:
    name: Test customer-api
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r services/customer-api/requirements.txt
      - name: Run Pytest
        run: cd services/customer-api && pytest tests/ -v --tb=short

  test-query-api:
    name: Test query-api
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r services/query-api/requirements.txt
      - name: Run Pytest
        run: cd services/query-api && pytest tests/ -v --tb=short

  build:
    name: Build And Push
    runs-on: ubuntu-latest
    needs: [test-datacenter-api, test-customer-api, test-query-api]
    if: github.ref == 'refs/heads/main'
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login To Registry
        run: |
          REGISTRY_HOST=$(printf '%s' "$REGISTRY" | cut -d/ -f1)
          printf '%s' "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
      - name: Build And Push datacenter-api
        run: docker buildx build --push -t "$REGISTRY/bulutistan-datacenter-api:${GITHUB_SHA}" -t "$REGISTRY/bulutistan-datacenter-api:latest" -f services/datacenter-api/Dockerfile services/datacenter-api
      - name: Build And Push customer-api
        run: docker buildx build --push -t "$REGISTRY/bulutistan-customer-api:${GITHUB_SHA}" -t "$REGISTRY/bulutistan-customer-api:latest" -f services/customer-api/Dockerfile services/customer-api
      - name: Build And Push query-api
        run: docker buildx build --push -t "$REGISTRY/bulutistan-query-api:${GITHUB_SHA}" -t "$REGISTRY/bulutistan-query-api:latest" -f services/query-api/Dockerfile services/query-api
      - name: Build And Push Frontend
        run: docker buildx build --push -t "$REGISTRY/bulutistan-frontend:${GITHUB_SHA}" -t "$REGISTRY/bulutistan-frontend:latest" -f Dockerfile .
