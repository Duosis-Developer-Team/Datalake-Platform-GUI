name: CI/CD Pipeline

"on":
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check backend/app/ --select E,F,W --ignore E501

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bulutlake
          POSTGRES_USER: datalakeui
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datalakeui -d bulutlake"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: bulutlake
      DB_USER: datalakeui
      DB_PASS: test_password
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Backend Dependencies
        run: pip install -r backend/requirements.txt
      - name: Install Test Dependencies
        run: pip install pytest pytest-cov
      - name: Run Pytest
        run: cd backend && pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=85

  build:
    name: Build And Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login To Registry
        run: |
          REGISTRY_HOST=$(printf '%s' "$REGISTRY" | cut -d/ -f1)
          printf '%s' "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
      - name: Build And Push Backend
        run: docker buildx build --push -t "$REGISTRY/bulutistan-data-api:${GITHUB_SHA}" -t "$REGISTRY/bulutistan-data-api:latest" -f backend/Dockerfile ./backend
      - name: Build And Push Frontend
        run: docker buildx build --push -t "$REGISTRY/bulutistan-frontend:${GITHUB_SHA}" -t "$REGISTRY/bulutistan-frontend:latest" -f Dockerfile .
