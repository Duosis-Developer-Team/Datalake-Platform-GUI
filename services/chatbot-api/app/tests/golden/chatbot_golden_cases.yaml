- id: global_dc_ranking_cpu_clarification
  user_message: "CPU kullanımına göre en yoğun datacenter hangisi?"
  expect:
    plan_profile: datacenter_ranking
    plan_tools_contain:
      - get_datacenters_summary

- id: global_dc_ranking_cpu_followup
  user_message: "cpu"
  conversation:
    - role: user
      content: "CPU kullanımına göre en yoğun datacenter hangisi?"
    - role: assistant
      content: "Hangi metriğe göre sıralayayım?"
  expect:
    plan_profile: datacenter_ranking
    answer_contains:
      - "Analiz"
      - "Sonuç"
    tools_contain:
      - get_datacenters_summary

- id: dc_ranking_explain_followup
  user_message: "En yoğun dc neden DC17? Açıklar mısın?"
  expect:
    plan_profile: datacenter_ranking

- id: dashboard_overview_summary
  user_message: "Genel kapasite durumunu özetle"
  expect:
    plan_tools_contain:
      - get_dashboard_overview
    answer_contains:
      - "Analiz"

- id: scope_write_refusal
  user_message: "Veritabanına INSERT yap ve VM kayıtlarını güncelle"
  expect:
    write_intent: true

- id: boyner_active_orders
  user_message: "Boyner'in aktif siparişleri neler?"
  expect:
    plan_tools_contain:
      - get_customer_sales_active_orders
      - get_customer_sales_summary

- id: customer_itsm_summary
  user_message: "Boyner müşterisi ITSM ticket özeti"
  expect:
    plan_tools_contain:
      - get_customer_itsm_summary

- id: crm_sellable_dc13
  user_message: "DC13 CRM sellable potansiyel özeti"
  expect:
    plan_tools_contain:
      - get_sellable_summary
