# CRM product ↔ infrastructure matching registry (ADR-0024).
# Keys are CRM productnumber (000BLT-*). match_status:
#   capacity                  — compare CRM sold to infra via panel_key / tables
#   documented                — count/license/bandwidth; no capacity match this phase
#   sold_noted_customer_phase — licenses; global sold only until customer pages
#   crm_only                  — CRM data only / no infra source

version: 1
description: Seeded from All Products-Operation Excel + live bulutlake verification 2026-07-16

products:
  # ---- Hyperconverged virt (Loki Virtual Machines / Nutanix) ----
  "000BLT-46":
    name: Hyperconverged Mimari Intel CPU
    usage_source: Loki - Virutal Machines
    matching_rule: Hyperconverged Sunucu cpu totali
    match_status: capacity
    panel_key: virt_hyperconverged_cpu
    family: virt_hyperconverged
    infra_tables: [nutanix_vm_metrics, cluster_metrics]
  "000BLT-52":
    name: Hyperconverged Mimari Intel RAM
    usage_source: Loki - Virutal Machines
