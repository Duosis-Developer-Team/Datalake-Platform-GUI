# REFERENCE ONLY — do NOT commit a real token.
#
# Create the real secret out-of-band (never in git), e.g.:
#   kubectl create secret generic bulutistan-llm-secret \
#     --from-literal=BULUTISTAN_LLM_API_KEY='<real-token>'
# or manage it via a SealedSecret / ExternalSecret.
#
# The placeholder below exists so `kubectl apply -f k8s/chatbot-api/` works in a
# dev cluster; replace it through a secret manager in production.
apiVersion: v1
kind: Secret
metadata:
  name: bulutistan-llm-secret
type: Opaque
stringData:
  BULUTISTAN_LLM_API_KEY: "REPLACE_WITH_REAL_TOKEN_OUTSIDE_GIT"
