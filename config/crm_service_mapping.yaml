# CRM service mapping — human-readable registry (mirrors gui_crm_service_pages after DB migration).
# v3 (2026-05-04): adds the granular panel taxonomy used by the C-level Sellable
# Potential dashboard (one panel per resource within an environment, e.g.
# virt_hyperconverged_ram). Authoritative product seed is now generated by:
#   python Datalake-Platform-GUI/shared/sellable/generate_panel_mapping_sql.py \
#     --csv <discovery_crm_products.csv> \
#     --out Datalake-Platform-GUI/services/customer-api/migrations/webui/010_seed_full_product_mapping.sql
#
# The shared/service_mapping/generate_seed_sql.py legacy generator is still used
# for the regex-based fallback rule pack (kept for backward compatibility).

version: 3
description: >
  page_key values align with customer-api efficiency_usage category_code prefixes
  and with the C-level Sellable Potential dashboard panel_keys. Granular suffixes
  (_cpu, _ram, _storage) target a specific panel and resource within an
  environment. Each page_key links 1:1 to a gui_panel_definition.panel_key via
  the gui_crm_service_pages.panel_key column added in migration 005.

