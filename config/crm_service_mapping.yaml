# CRM service mapping — human-readable registry (mirrors gui_crm_service_pages after DB migration).
# Authoritative defaults for product rows are generated into SQL via:
#   PYTHONPATH=Datalake-Platform-GUI python Datalake-Platform-GUI/shared/service_mapping/generate_seed_sql.py
# Operator overrides live in PostgreSQL: gui_crm_service_mapping_override.

version: 2
description: >
  page_key values align with customer-api efficiency_usage category_code prefixes
  (e.g. virt_classic, backup_veeam). Granular suffixes (_cpu, _ram, _storage) target
  specific WebUI panels (e.g. Hyperconverged RAM panel). gui_tab_binding picks the
  Customer View tab; the suffix picks the metric within that tab.

